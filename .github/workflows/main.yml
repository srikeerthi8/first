name:   CI-WORKFLOW
on: 
  push: 
jobs: 
  build: 
    runs-on:  ubuntu-latest
    steps: 
      - name:  Checkout Code
        uses:  actions/checkout@v7

      - name:  Setup NodeJS
        uses:  actions/setup-node@v3
        with: 
          node-version:  22

      - name:  Install Dependencies
        run:  npm install

      - name: Run tests
        run: npm test

      - name:  Build Application
        run:  npm run build

      - name: Deploy
        run: echo "Deploying to production server..."
